<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Wallet body -->
  <rect x="4" y="14" width="52" height="38" rx="6" fill="#6C63FF"/>
  <!-- Wallet flap -->
  <path d="M4 20C4 16.6863 6.68629 14 10 14H54C57.3137 14 60 16.6863 60 20V26H4V20Z" fill="#5A52D5"/>
  <!-- Card slot -->
  <rect x="38" y="30" width="22" height="14" rx="4" fill="#F5F5F5"/>
  <!-- Coin circle -->
  <circle cx="49" cy="37" r="5" fill="#FFD700" stroke="#E6BE00" stroke-width="1"/>
  <!-- Dollar sign on coin -->
  <text x="49" y="40" text-anchor="middle" font-size="8" font-weight="bold" fill="#B8860B" font-family="Arial, sans-serif">$</text>
  <!-- Wallet stitching -->
  <line x1="10" y1="48" x2="34" y2="48" stroke="#8B80FF" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Card peek -->
  <rect x="8" y="18" width="20" height="4" rx="1" fill="#FF6B6B" opacity="0.7"/>
</svg>
